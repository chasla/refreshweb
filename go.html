<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIOX TP Warmup Runner</title>
    <style>
        :root {
            --bg: #eef2f6;
            --panel: #ffffff;
            --ink: #172033;
            --muted: #6b7280;
            --line: #d9e1ec;
            --soft: #f6f8fb;
            --brand: #0f766e;
            --brand-2: #155e75;
            --danger: #c2410c;
            --done: #16a34a;
            --active: #2563eb;
            --pending: #94a3b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Aptos", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 34%),
                linear-gradient(135deg, #f8fbff 0%, var(--bg) 48%, #e7edf5 100%);
            padding: 18px;
        }

        .app {
            display: grid;
            grid-template-columns: minmax(520px, 1fr) minmax(420px, 42vw);
            gap: 18px;
            height: calc(100vh - 36px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(217, 225, 236, 0.9);
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
            overflow: hidden;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(90deg, rgba(15, 118, 110, 0.08), rgba(21, 94, 117, 0.04));
        }

        h1 {
            margin: 0 0 6px;
            font-size: 20px;
            letter-spacing: -0.02em;
        }

        .sub {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .toolbar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            background: var(--soft);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            color: #334155;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #fff;
            color: var(--ink);
            font: inherit;
            outline: none;
            transition: border 0.15s, box-shadow 0.15s;
        }

        input {
            padding: 8px 10px;
        }

        textarea {
            min-height: 86px;
            resize: vertical;
            padding: 11px 12px;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        input:focus,
        textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 9px 10px;
            cursor: pointer;
            color: #fff;
            font-weight: 800;
            font-size: 12px;
            transition: transform 0.12s, opacity 0.12s, filter 0.12s;
        }

        button:hover {
            filter: brightness(1.04);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-build { background: var(--brand); }
        .btn-add { background: var(--brand-2); }
        .btn-start { background: #2563eb; }
        .btn-pause { background: #7c3aed; }
        .btn-stop { background: var(--danger); }
        .btn-copy { background: #475569; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
        }

        .stat {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .stat span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .stat strong {
            display: block;
            margin-top: 4px;
            font-size: 18px;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow: auto;
            flex: 1;
            background: #fff;
        }

        .empty {
            padding: 32px 20px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .task-item {
            position: relative;
            display: grid;
            grid-template-columns: 6px minmax(0, 1fr) auto;
            gap: 12px;
            padding: 12px 14px 12px 0;
            border-bottom: 1px solid #edf2f7;
            align-items: center;
        }

        .task-item:hover {
            background: #f8fafc;
        }

        .bar {
            height: 100%;
            min-height: 58px;
            background: var(--pending);
        }

        .status-active .bar { background: var(--active); }
        .status-done .bar { background: var(--done); }
        .status-error .bar { background: var(--danger); }

        .task-main {
            min-width: 0;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 12px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 8px;
            background: #e2e8f0;
            color: #334155;
            font-weight: 800;
            font-size: 11px;
        }

        .url {
            color: #075985;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .task-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .mini {
            padding: 6px 8px;
            border-radius: 8px;
            background: #e2e8f0;
            color: #334155;
        }

        .mini-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .screen-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: #0f172a;
            color: #d1fae5;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 12px;
            line-height: 1.55;
        }

        .runner-frame {
            width: 100%;
            flex: 1;
            min-height: 0;
            border: 0;
            background: #fff;
        }

        .notice {
            margin-top: 8px;
            color: #64748b;
            font-size: 12px;
            line-height: 1.45;
        }

        @media (max-width: 980px) {
            body {
                overflow: auto;
            }

            .app {
                grid-template-columns: 1fr;
                height: auto;
            }

            .right-panel {
                min-height: 70vh;
            }

            .settings-grid,
            .buttons,
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="panel left-panel">
            <div class="header">
                <h1>VIOX TP Warmup Runner</h1>
                <p class="sub">粘贴英文原文 URL，自动生成最终 25 个语言的 <code>?tp_warm=1</code> 队列。浏览器关闭会停止，但进度会保存在本机浏览器里。</p>
            </div>

            <div class="toolbar">
                <div class="settings-grid">
                    <div>
                        <label for="rounds">每个语言轮数</label>
                        <input id="rounds" type="number" min="1" max="5" value="2">
                    </div>
                    <div>
                        <label for="waitSeconds">每次等待秒数</label>
                        <input id="waitSeconds" type="number" min="20" max="900" value="120">
                    </div>
                    <div>
                        <label for="betweenLangSeconds">换语言缓冲秒数</label>
                        <input id="betweenLangSeconds" type="number" min="0" max="600" value="30">
                    </div>
                    <div>
                        <label for="siteHost">固定域名，可留空</label>
                        <input id="siteHost" type="text" placeholder="例如 https://viox.com">
                    </div>
                </div>

                <label for="baseUrl">英文原文 URL，每行一个</label>
                <textarea id="baseUrl" placeholder="例如：https://viox.com/fuse-to-breaker-retrofit-for-motor-control-panels-complete-engineering-guide-2026-3/"></textarea>

                <div class="buttons">
                    <button class="btn-build" id="buildBtn">生成新队列</button>
                    <button class="btn-add" id="appendBtn">追加队列</button>
                    <button class="btn-start" id="startBtn">开始/继续</button>
                    <button class="btn-pause" id="pauseBtn">暂停</button>
                    <button class="btn-stop" id="resetBtn">重置</button>
                    <button class="btn-copy" id="copyBtn">复制 URLs</button>
                </div>

                <p class="notice">建议正式站只开一个页面跑，电脑不要睡眠。长文章可以保持 2 轮；如果发现内容没补齐，再对同一篇文章追加第 3 轮。</p>
            </div>

            <div class="stats">
                <div class="stat"><span>总任务</span><strong id="statTotal">0</strong></div>
                <div class="stat"><span>已完成</span><strong id="statDone">0</strong></div>
                <div class="stat"><span>当前位置</span><strong id="statIndex">0</strong></div>
                <div class="stat"><span>预计剩余</span><strong id="statEta">0m</strong></div>
            </div>

            <ul class="task-list" id="taskList">
                <li class="empty">请先输入英文 URL 生成队列。</li>
            </ul>
        </section>

        <section class="panel right-panel">
            <div class="screen-header" id="statusText">系统待机。等待生成队列。</div>
            <iframe class="runner-frame" id="workFrame" src="about:blank" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
    </main>

    <script>
        const LANGUAGES = [
            { code: 'es_ES', slug: 'es', name: '西班牙语' },
            { code: 'pt_PT', slug: 'pt', name: '葡萄牙语' },
            { code: 'fr_FR', slug: 'fr', name: '法语' },
            { code: 'vi', slug: 'vi', name: '越南语' },
            { code: 'id_ID', slug: 'id', name: '印尼语' },
            { code: 'ko_KR', slug: 'ko', name: '韩语' },
            { code: 'tr_TR', slug: 'tr', name: '土耳其语' },
            { code: 'ar', slug: 'ar', name: '阿拉伯语' },
            { code: 'de_DE', slug: 'de', name: '德语' },
            { code: 'it_IT', slug: 'it', name: '意大利语' },
            { code: 'th', slug: 'th', name: '泰语' },
            { code: 'ja', slug: 'ja', name: '日语' },
            { code: 'pl_PL', slug: 'pl', name: '波兰语' },
            { code: 'my_MM', slug: 'my', name: '缅甸语' },
            { code: 'ru_RU', slug: 'ru', name: '俄语' },
            { code: 'km', slug: 'km', name: '高棉语' },
            { code: 'lo', slug: 'lo', name: '老挝语' },
            { code: 'el', slug: 'el', name: '希腊语' },
            { code: 'cs_CZ', slug: 'cs', name: '捷克语' },
            { code: 'ms_MY', slug: 'ms', name: '马来语' },
            { code: 'ur', slug: 'ur', name: '乌尔都语' },
            { code: 'hu_HU', slug: 'hu', name: '匈牙利语' },
            { code: 'fa_IR', slug: 'fa', name: '波斯语' },
            { code: 'tl', slug: 'tl', name: '塔加洛语' },
            { code: 'bn_BD', slug: 'bn', name: '孟加拉语' }
        ];

        const STORAGE_KEY = 'vioxTpWarmupRunner:v2';
        const ALL_SLUGS = ['en', 'cn', ...LANGUAGES.map(item => item.slug)];

        let taskQueue = [];
        let currentIndex = 0;
        let isRunning = false;
        let timerId = null;
        let countdownId = null;

        const els = {
            rounds: document.getElementById('rounds'),
            waitSeconds: document.getElementById('waitSeconds'),
            betweenLangSeconds: document.getElementById('betweenLangSeconds'),
            siteHost: document.getElementById('siteHost'),
            baseUrl: document.getElementById('baseUrl'),
            buildBtn: document.getElementById('buildBtn'),
            appendBtn: document.getElementById('appendBtn'),
            startBtn: document.getElementById('startBtn'),
            pauseBtn: document.getElementById('pauseBtn'),
            resetBtn: document.getElementById('resetBtn'),
            copyBtn: document.getElementById('copyBtn'),
            taskList: document.getElementById('taskList'),
            statusText: document.getElementById('statusText'),
            workFrame: document.getElementById('workFrame'),
            statTotal: document.getElementById('statTotal'),
            statDone: document.getElementById('statDone'),
            statIndex: document.getElementById('statIndex'),
            statEta: document.getElementById('statEta')
        };

        window.addEventListener('beforeunload', event => {
            if (!isRunning) return;
            event.preventDefault();
            event.returnValue = 'Warmup 队列正在运行，关闭浏览器会停止任务。';
        });

        els.buildBtn.addEventListener('click', () => buildQueue(false));
        els.appendBtn.addEventListener('click', () => buildQueue(true));
        els.startBtn.addEventListener('click', startRunner);
        els.pauseBtn.addEventListener('click', pauseRunner);
        els.resetBtn.addEventListener('click', resetRunner);
        els.copyBtn.addEventListener('click', copyUrls);

        loadState();
        renderAll();

        function readSettings() {
            return {
                rounds: clampNumber(els.rounds.value, 1, 5, 2),
                waitSeconds: clampNumber(els.waitSeconds.value, 20, 900, 120),
                betweenLangSeconds: clampNumber(els.betweenLangSeconds.value, 0, 600, 30)
            };
        }

        function clampNumber(value, min, max, fallback) {
            const parsed = parseInt(value, 10);
            if (Number.isNaN(parsed)) return fallback;
            return Math.max(min, Math.min(max, parsed));
        }

        function buildQueue(append) {
            const lines = els.baseUrl.value.split('\n').map(line => line.trim()).filter(Boolean);
            if (!lines.length) {
                alert('请先输入英文 URL。');
                return;
            }

            if (!append) {
                pauseRunner();
                taskQueue = [];
                currentIndex = 0;
                els.workFrame.src = 'about:blank';
            }

            const settings = readSettings();
            const newTasks = [];

            for (const line of lines) {
                const cleaned = normalizeSourceUrl(line);
                if (!cleaned) continue;

                for (const lang of LANGUAGES) {
                    for (let round = 1; round <= settings.rounds; round++) {
                        newTasks.push(makeTask(cleaned, lang, round, settings.rounds));
                    }
                }
            }

            if (!newTasks.length) {
                alert('没有生成有效任务，请检查 URL。');
                return;
            }

            taskQueue.push(...newTasks);
            els.baseUrl.value = '';
            saveState();
            renderAll();
            setStatus(`已${append ? '追加' : '生成'} ${newTasks.length} 个任务。总任务 ${taskQueue.length} 个。`);
        }

        function normalizeSourceUrl(raw) {
            let text = raw.trim();
            if (!text) return null;
            if (!/^https?:\/\//i.test(text)) text = 'https://' + text;

            try {
                const url = new URL(text);
                const forcedHost = normalizeHost(els.siteHost.value.trim());
                const origin = forcedHost || url.origin;
                const cleanPath = stripKnownLanguagePrefix(url.pathname || '/');
                return {
                    origin,
                    path: cleanPath,
                    search: url.search
                };
            } catch (error) {
                console.warn('Invalid URL:', raw, error);
                return null;
            }
        }

        function normalizeHost(host) {
            if (!host) return '';
            const text = /^https?:\/\//i.test(host) ? host : 'https://' + host;
            try {
                return new URL(text).origin;
            } catch (error) {
                return '';
            }
        }

        function stripKnownLanguagePrefix(pathname) {
            const parts = pathname.split('/').filter(Boolean);
            if (parts.length && ALL_SLUGS.includes(parts[0].toLowerCase())) {
                parts.shift();
            }
            const clean = '/' + parts.join('/');
            return pathname.endsWith('/') ? clean.replace(/\/?$/, '/') : clean;
        }

        function makeTask(source, lang, round, rounds) {
            const path = '/' + lang.slug + source.path;
            const url = new URL(path.replace(/\/{2,}/g, '/'), source.origin);

            if (source.search) {
                const params = new URLSearchParams(source.search);
                params.forEach((value, key) => url.searchParams.set(key, value));
            }

            url.searchParams.set('tp_warm', '1');
            url.searchParams.set('viox_warm_lang', lang.slug);
            url.searchParams.set('viox_warm_round', String(round));
            url.searchParams.set('nocache', Date.now().toString() + '-' + Math.random().toString(36).slice(2, 8));

            return {
                url: url.toString(),
                langSlug: lang.slug,
                langCode: lang.code,
                langName: lang.name,
                round,
                rounds,
                status: 'pending'
            };
        }

        function startRunner() {
            if (!taskQueue.length) {
                alert('请先生成队列。');
                return;
            }

            if (currentIndex >= taskQueue.length) {
                currentIndex = 0;
                taskQueue.forEach(task => task.status = 'pending');
                renderAll();
            }

            isRunning = true;
            runCurrent();
        }

        function pauseRunner() {
            isRunning = false;
            clearTimers();
            saveState();
            setStatus(`已暂停。当前位置 ${Math.min(currentIndex + 1, taskQueue.length)} / ${taskQueue.length}。`);
        }

        function resetRunner() {
            if (taskQueue.length && !confirm('确定重置整个队列和进度吗？')) return;
            pauseRunner();
            taskQueue = [];
            currentIndex = 0;
            els.workFrame.src = 'about:blank';
            saveState();
            renderAll();
            setStatus('已重置。');
        }

        function runCurrent() {
            clearTimers();

            if (!isRunning) return;
            if (currentIndex >= taskQueue.length) {
                isRunning = false;
                saveState();
                renderAll();
                setStatus('全部任务完成。建议再抽查几个语言页面确认没有漏翻。');
                return;
            }

            const settings = readSettings();
            const task = taskQueue[currentIndex];
            task.status = 'active';
            saveState();
            renderAll();

            els.workFrame.src = task.url;
            const waitSeconds = settings.waitSeconds + shouldAddLanguageGap(currentIndex) * settings.betweenLangSeconds;
            let remaining = waitSeconds;

            updateRunningStatus(task, remaining);
            countdownId = window.setInterval(() => {
                remaining -= 1;
                updateRunningStatus(task, remaining);
                if (remaining <= 0) clearInterval(countdownId);
            }, 1000);

            timerId = window.setTimeout(() => {
                finishCurrent();
            }, waitSeconds * 1000);
        }

        function shouldAddLanguageGap(index) {
            const current = taskQueue[index];
            const next = taskQueue[index + 1];
            return current && next && current.langSlug !== next.langSlug ? 1 : 0;
        }

        function finishCurrent() {
            if (!taskQueue[currentIndex]) return;
            taskQueue[currentIndex].status = 'done';
            currentIndex += 1;
            saveState();
            runCurrent();
        }

        function startFrom(index) {
            if (isRunning && !confirm('当前正在运行，确定跳到这个任务开始吗？')) return;
            pauseRunner();
            currentIndex = index;
            taskQueue.forEach((task, taskIndex) => {
                task.status = taskIndex < index ? 'done' : 'pending';
            });
            saveState();
            renderAll();
            startRunner();
        }

        function removeTask(index) {
            if (isRunning) {
                alert('运行中先暂停，再删除任务。');
                return;
            }
            taskQueue.splice(index, 1);
            if (currentIndex > index) currentIndex -= 1;
            if (currentIndex > taskQueue.length) currentIndex = taskQueue.length;
            saveState();
            renderAll();
        }

        function copyUrls() {
            if (!taskQueue.length) {
                alert('当前没有队列。');
                return;
            }
            const text = taskQueue.map(task => task.url).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                setStatus(`已复制 ${taskQueue.length} 个 URL。`);
            }).catch(() => {
                const box = document.createElement('textarea');
                box.value = text;
                document.body.appendChild(box);
                box.select();
                document.execCommand('copy');
                box.remove();
                setStatus(`已复制 ${taskQueue.length} 个 URL。`);
            });
        }

        function clearTimers() {
            if (timerId) clearTimeout(timerId);
            if (countdownId) clearInterval(countdownId);
            timerId = null;
            countdownId = null;
        }

        function updateRunningStatus(task, remaining) {
            const safeRemaining = Math.max(0, remaining);
            setStatus(`正在跑 ${task.langName} / ${task.langSlug}，第 ${task.round}/${task.rounds} 轮。剩余 ${safeRemaining}s。`);
            updateStats(safeRemaining);
        }

        function setStatus(text) {
            els.statusText.textContent = text;
        }

        function renderAll() {
            if (!taskQueue.length) {
                els.taskList.innerHTML = '<li class="empty">请先输入英文 URL 生成队列。</li>';
                updateStats();
                return;
            }

            const html = taskQueue.map((task, index) => {
                const status = index === currentIndex && isRunning ? 'active' : task.status;
                const statusText = status === 'done' ? '完成' : status === 'active' ? '运行中' : '待命';
                return `
                    <li class="task-item status-${status}" id="task-${index}">
                        <div class="bar"></div>
                        <div class="task-main">
                            <div class="task-meta">
                                <span class="pill">#${index + 1}</span>
                                <span class="pill">${escapeHtml(task.langSlug)}</span>
                                <span>${escapeHtml(task.langName)}</span>
                                <span>第 ${task.round}/${task.rounds} 轮</span>
                                <span>${statusText}</span>
                            </div>
                            <div class="url">${escapeHtml(task.url)}</div>
                        </div>
                        <div class="task-actions">
                            <button class="mini" onclick="startFrom(${index})">从这开始</button>
                            <button class="mini mini-danger" onclick="removeTask(${index})">删除</button>
                        </div>
                    </li>
                `;
            }).join('');

            els.taskList.innerHTML = html;
            const active = document.getElementById(`task-${currentIndex}`);
            if (active) active.scrollIntoView({ block: 'center' });
            updateStats();
        }

        function updateStats(currentCountdown) {
            const done = taskQueue.filter(task => task.status === 'done').length;
            const settings = readSettings();
            const remainingTasks = Math.max(0, taskQueue.length - currentIndex);
            const averageSeconds = settings.waitSeconds + Math.round(settings.betweenLangSeconds / Math.max(1, settings.rounds));
            const etaSeconds = typeof currentCountdown === 'number'
                ? currentCountdown + Math.max(0, remainingTasks - 1) * averageSeconds
                : remainingTasks * averageSeconds;

            els.statTotal.textContent = String(taskQueue.length);
            els.statDone.textContent = String(done);
            els.statIndex.textContent = taskQueue.length ? `${Math.min(currentIndex + 1, taskQueue.length)}/${taskQueue.length}` : '0';
            els.statEta.textContent = formatDuration(etaSeconds);
        }

        function formatDuration(seconds) {
            const mins = Math.ceil(seconds / 60);
            if (mins < 60) return mins + 'm';
            const hours = Math.floor(mins / 60);
            const rest = mins % 60;
            return `${hours}h ${rest}m`;
        }

        function saveState() {
            const state = {
                taskQueue,
                currentIndex,
                settings: {
                    rounds: els.rounds.value,
                    waitSeconds: els.waitSeconds.value,
                    betweenLangSeconds: els.betweenLangSeconds.value,
                    siteHost: els.siteHost.value
                }
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const state = JSON.parse(raw);
                taskQueue = Array.isArray(state.taskQueue) ? state.taskQueue : [];
                currentIndex = Number.isInteger(state.currentIndex) ? state.currentIndex : 0;
                if (state.settings) {
                    els.rounds.value = state.settings.rounds || '2';
                    els.waitSeconds.value = state.settings.waitSeconds || '120';
                    els.betweenLangSeconds.value = state.settings.betweenLangSeconds || '30';
                    els.siteHost.value = state.settings.siteHost || '';
                }
                if (taskQueue.length) {
                    setStatus(`已恢复上次队列。当前位置 ${Math.min(currentIndex + 1, taskQueue.length)} / ${taskQueue.length}。`);
                }
            } catch (error) {
                console.warn('Could not load saved state:', error);
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        window.startFrom = startFrom;
        window.removeTask = removeTask;
    </script>
</body>
</html>
